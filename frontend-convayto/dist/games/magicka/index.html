<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Magicka — Convayto Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Segoe UI',system-ui,sans-serif;color:#e0e0e0}
#game-container{width:100%;height:100%;position:relative}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;right:0;pointer-events:none;padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start}
#hud *{pointer-events:auto}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:8px}
.hp-bar-bg{width:200px;height:20px;background:rgba(0,0,0,0.6);border-radius:10px;border:2px solid rgba(255,255,255,0.15);overflow:hidden}
.hp-bar{height:100%;background:linear-gradient(90deg,#e53e3e,#fc8181);border-radius:8px;transition:width .3s}
.mana-bar-bg{width:200px;height:14px;background:rgba(0,0,0,0.6);border-radius:7px;border:2px solid rgba(255,255,255,0.15);overflow:hidden}
.mana-bar{height:100%;background:linear-gradient(90deg,#3182ce,#63b3ed);border-radius:5px;transition:width .3s}
.score{font-size:18px;font-weight:700;color:#ffd700;text-shadow:0 0 10px rgba(255,215,0,0.5)}
.wave{font-size:14px;color:#a0aec0}
#element-queue{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);display:flex;gap:6px;padding:8px 16px;background:rgba(0,0,0,0.7);border-radius:20px;border:1px solid rgba(255,255,255,0.1)}
.eq-slot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);transition:all .15s}
.eq-slot.filled{border-color:rgba(255,255,255,0.5);transform:scale(1.1);animation:popIn .2s}
@keyframes popIn{0%{transform:scale(0.5)}50%{transform:scale(1.2)}100%{transform:scale(1.1)}}
#controls{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:4px;padding:8px 12px;background:rgba(0,0,0,0.7);border-radius:16px;border:1px solid rgba(255,255,255,0.1)}
.elem-key{width:44px;height:44px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;cursor:pointer;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.elem-key:hover{background:rgba(255,255,255,0.12);transform:translateY(-2px)}
.elem-key:active,.elem-key.pressed{transform:scale(0.92);background:rgba(255,255,255,0.2)}
.elem-key .icon{font-size:18px}
.elem-key .key{font-size:9px;opacity:0.5;margin-top:1px}
#cast-btns{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:6px}
.cast-btn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all .15s;user-select:none}
.cast-btn:hover{background:rgba(255,255,255,0.15);transform:scale(1.05)}
.cast-btn:active{transform:scale(0.93)}
#start-screen{position:absolute;inset:0;background:radial-gradient(ellipse at center,#1a1a3e 0%,#0a0a1a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:20px}
#start-screen h1{font-size:48px;font-weight:900;background:linear-gradient(135deg,#667eea,#764ba2,#f093fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;letter-spacing:3px}
#start-screen .subtitle{font-size:16px;opacity:0.6;margin-top:-10px}
#start-screen .start-btn{padding:14px 48px;font-size:18px;font-weight:700;border:none;border-radius:30px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;cursor:pointer;transition:all .2s;letter-spacing:1px}
#start-screen .start-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(102,126,234,0.5)}
.controls-hint{display:grid;grid-template-columns:auto auto;gap:4px 16px;font-size:13px;opacity:0.5;margin-top:10px}
.controls-hint span:nth-child(odd){text-align:right;opacity:0.7}
#death-screen{position:absolute;inset:0;background:rgba(10,10,26,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:16px}
#death-screen h2{font-size:36px;color:#e53e3e;font-weight:800}
#death-screen .final-score{font-size:24px;color:#ffd700}
#death-screen .restart-btn{padding:12px 40px;font-size:16px;font-weight:700;border:none;border-radius:25px;background:linear-gradient(135deg,#e53e3e,#fc8181);color:#fff;cursor:pointer;transition:all .2s}
#death-screen .restart-btn:hover{transform:scale(1.05)}
#mobile-dpad{position:absolute;bottom:80px;left:16px;display:none;flex-direction:column;align-items:center;gap:2px}
.dpad-row{display:flex;gap:2px}
.dpad-btn{width:48px;height:48px;border-radius:10px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.dpad-btn:active{background:rgba(255,255,255,0.25)}
@media(max-width:768px){
  .hp-bar-bg{width:120px;height:16px}
  .mana-bar-bg{width:120px;height:10px}
  .score{font-size:14px}
  .elem-key{width:36px;height:36px}
  .elem-key .icon{font-size:15px}
  .eq-slot{width:30px;height:30px;font-size:15px}
  #mobile-dpad{display:flex}
  #start-screen h1{font-size:32px}
}
@media(max-width:480px){
  .elem-key{width:30px;height:30px;border-radius:8px}
  .elem-key .icon{font-size:13px}
  .elem-key .key{display:none}
  .eq-slot{width:26px;height:26px;font-size:13px}
  .cast-btn{width:46px;height:46px;font-size:18px}
}
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hud-left">
      <div class="hp-bar-bg"><div class="hp-bar" id="hp-bar" style="width:100%"></div></div>
      <div class="mana-bar-bg"><div class="mana-bar" id="mana-bar" style="width:100%"></div></div>
    </div>
    <div class="hud-right">
      <div class="score" id="score-display">0</div>
      <div class="wave" id="wave-display">Волна 1</div>
    </div>
  </div>

  <div id="element-queue">
    <div class="eq-slot" id="eq0"></div>
    <div class="eq-slot" id="eq1"></div>
    <div class="eq-slot" id="eq2"></div>
    <div class="eq-slot" id="eq3"></div>
    <div class="eq-slot" id="eq4"></div>
  </div>

  <div id="controls">
    <div class="elem-key" data-elem="water"><span class="icon">💧</span><span class="key">Q</span></div>
    <div class="elem-key" data-elem="fire"><span class="icon">🔥</span><span class="key">W</span></div>
    <div class="elem-key" data-elem="earth"><span class="icon">🪨</span><span class="key">E</span></div>
    <div class="elem-key" data-elem="lightning"><span class="icon">⚡</span><span class="key">R</span></div>
    <div class="elem-key" data-elem="cold"><span class="icon">❄️</span><span class="key">A</span></div>
    <div class="elem-key" data-elem="life"><span class="icon">💚</span><span class="key">S</span></div>
    <div class="elem-key" data-elem="shield"><span class="icon">🛡️</span><span class="key">D</span></div>
    <div class="elem-key" data-elem="arcane"><span class="icon">🔮</span><span class="key">F</span></div>
  </div>

  <div id="cast-btns">
    <div class="cast-btn" id="cast-beam" title="Луч (ЛКМ / Space)">🔆</div>
    <div class="cast-btn" id="cast-area" title="Область (Shift+ЛКМ)">💥</div>
    <div class="cast-btn" id="cast-self" title="На себя (ПКМ / C)">🧙</div>
  </div>

  <div id="mobile-dpad">
    <div class="dpad-row"><div class="dpad-btn" data-dir="up">▲</div></div>
    <div class="dpad-row">
      <div class="dpad-btn" data-dir="left">◀</div>
      <div class="dpad-btn" data-dir="down">▼</div>
      <div class="dpad-btn" data-dir="right">▶</div>
    </div>
  </div>

  <div id="start-screen">
    <h1>⚡ MAGICKA ⚡</h1>
    <p class="subtitle">Комбинируй элементы. Уничтожай врагов.</p>
    <button class="start-btn" id="start-btn">НАЧАТЬ ИГРУ</button>
    <div class="controls-hint">
      <span>Движение</span><span>WASD / Стрелки</span>
      <span>Элементы</span><span>Q W E R A S D F</span>
      <span>Луч</span><span>ЛКМ / Space</span>
      <span>Область</span><span>Shift + ЛКМ</span>
      <span>На себя</span><span>ПКМ / C</span>
      <span>Сброс</span><span>X</span>
    </div>
  </div>

  <div id="death-screen">
    <h2>☠️ ПОГИБ</h2>
    <div class="final-score" id="final-score">Очки: 0</div>
    <button class="restart-btn" id="restart-btn">ЗАНОВО</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// MAGICKA — Browser Game Engine
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ── Elements ──────────────────────────────────────────────────
const ELEMENTS = {
  water:     { emoji:'💧', color:'#3182ce', key:'q', opposite:'lightning' },
  fire:      { emoji:'🔥', color:'#e53e3e', key:'w', opposite:'cold' },
  earth:     { emoji:'🪨', color:'#8B6914', key:'e', opposite:'lightning' },
  lightning: { emoji:'⚡', color:'#d69e2e', key:'r', opposite:'earth' },
  cold:      { emoji:'❄️', color:'#90cdf4', key:'a', opposite:'fire' },
  life:      { emoji:'💚', color:'#38a169', key:'s', opposite:'arcane' },
  shield:    { emoji:'🛡️', color:'#a0aec0', key:'d', opposite:null },
  arcane:    { emoji:'🔮', color:'#805ad5', key:'f', opposite:'life' },
};

// ── Combinations ──────────────────────────────────────────────
const COMBOS = {
  'water+cold':      { name:'Лёд',        color:'#bee3f8', dmg:1.5, effect:'freeze',   emoji:'🧊' },
  'fire+water':      { name:'Пар',        color:'#e2e8f0', dmg:1.2, effect:'blind',    emoji:'♨️' },
  'fire+earth':      { name:'Лава',       color:'#f56500', dmg:2.0, effect:'burn',     emoji:'🌋' },
  'lightning+water':  { name:'Шторм',     color:'#4299e1', dmg:2.5, effect:'chain',    emoji:'🌊' },
  'lightning+fire':   { name:'Плазма',    color:'#fbb6ce', dmg:3.0, effect:'explode',  emoji:'✴️' },
  'cold+arcane':      { name:'Заморозка', color:'#b794f4', dmg:2.0, effect:'shatter',  emoji:'💎' },
  'life+fire':        { name:'Феникс',    color:'#f6ad55', dmg:1.8, effect:'heal_dmg', emoji:'🦅' },
  'earth+shield':     { name:'Стена',     color:'#a0916a', dmg:0.5, effect:'wall',     emoji:'🧱' },
  'arcane+lightning':  { name:'Нова',     color:'#9f7aea', dmg:3.5, effect:'nova',     emoji:'💫' },
  'life+water':       { name:'Исцеление', color:'#68d391', dmg:0,   effect:'heal',     emoji:'✨' },
  'fire+cold':        { name:'Взрыв',     color:'#fc8181', dmg:2.2, effect:'explode',  emoji:'💥' },
  'shield+life':      { name:'Барьер',    color:'#90e0a0', dmg:0,   effect:'barrier',  emoji:'🔰' },
  'arcane+fire':      { name:'Хаос',      color:'#d53f8c', dmg:2.8, effect:'chaos',    emoji:'🌀' },
  'earth+cold':       { name:'Обломки',   color:'#718096', dmg:1.6, effect:'shards',   emoji:'💠' },
  'shield+arcane':    { name:'Отражение', color:'#c4b5fd', dmg:0,   effect:'reflect',  emoji:'🪞' },
};

function getCombo(a, b) {
  return COMBOS[a+'+'+b] || COMBOS[b+'+'+a] || null;
}

// ── Game State ────────────────────────────────────────────────
let W, H;
let gameRunning = false;
let gameTime = 0;
let score = 0;
let wave = 1;
let waveTimer = 0;
const WAVE_DURATION = 25000;

const player = {
  x:0, y:0, hp:100, maxHp:100, mana:100, maxMana:100,
  radius:18, speed:3.5, angle:0, invulnTimer:0,
  shieldActive:false, shieldTimer:0, barrierHp:0,
  effects:[], velX:0, velY:0
};

let elementQueue = [];
const MAX_QUEUE = 5;
let enemies = [];
let projectiles = [];
let particles = [];
let spellEffects = [];
let pickups = [];

const keys = {};
let mouseX = 0, mouseY = 0;
let aimAngle = 0;

// ── Resize ────────────────────────────────────────────────────
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.clientWidth;
  H = canvas.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ── Input ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  const k = e.key.toLowerCase();
  keys[k] = true;

  // Element keys
  for (const [name, el] of Object.entries(ELEMENTS)) {
    if (k === el.key) {
      addElement(name);
      const btn = document.querySelector(`.elem-key[data-elem="${name}"]`);
      if (btn) { btn.classList.add('pressed'); setTimeout(() => btn.classList.remove('pressed'), 150); }
      e.preventDefault();
    }
  }

  if (k === ' ' || k === 'space') { castSpell('beam'); e.preventDefault(); }
  if (k === 'c') { castSpell('self'); e.preventDefault(); }
  if (k === 'x') { elementQueue = []; updateQueueUI(); e.preventDefault(); }
});

document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
  aimAngle = Math.atan2(mouseY - player.y, mouseX - player.x);
});

canvas.addEventListener('mousedown', e => {
  if (!gameRunning) return;
  e.preventDefault();
  if (e.shiftKey || e.button === 2) castSpell('area');
  else castSpell('beam');
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (gameRunning) castSpell('self');
});

// Mobile d-pad
document.querySelectorAll('.dpad-btn').forEach(btn => {
  const dir = btn.dataset.dir;
  const handler = (pressed) => {
    if (dir==='up') keys['arrowup'] = pressed;
    if (dir==='down') keys['arrowdown'] = pressed;
    if (dir==='left') keys['arrowleft'] = pressed;
    if (dir==='right') keys['arrowright'] = pressed;
  };
  btn.addEventListener('touchstart', e => { e.preventDefault(); handler(true); });
  btn.addEventListener('touchend', e => { e.preventDefault(); handler(false); });
});

// Mobile element buttons
document.querySelectorAll('.elem-key').forEach(btn => {
  btn.addEventListener('click', () => { if (gameRunning) addElement(btn.dataset.elem); });
});

document.getElementById('cast-beam').addEventListener('click', () => { if (gameRunning) castSpell('beam'); });
document.getElementById('cast-area').addEventListener('click', () => { if (gameRunning) castSpell('area'); });
document.getElementById('cast-self').addEventListener('click', () => { if (gameRunning) castSpell('self'); });

// ── Element Queue ─────────────────────────────────────────────
function addElement(name) {
  // Opposite elements cancel
  if (elementQueue.length > 0) {
    const opp = ELEMENTS[name].opposite;
    const idx = elementQueue.indexOf(opp);
    if (idx !== -1) {
      elementQueue.splice(idx, 1);
      spawnParticles(player.x, player.y, 6, '#fff', 3);
      updateQueueUI();
      return;
    }
  }
  if (elementQueue.length >= MAX_QUEUE) return;
  // Don't add duplicate of same element more than 2 times
  const count = elementQueue.filter(e => e === name).length;
  if (count >= 2) return;
  elementQueue.push(name);
  updateQueueUI();
}

function updateQueueUI() {
  for (let i = 0; i < MAX_QUEUE; i++) {
    const slot = document.getElementById('eq' + i);
    if (i < elementQueue.length) {
      const el = ELEMENTS[elementQueue[i]];
      slot.textContent = el.emoji;
      slot.style.background = el.color + '30';
      slot.style.borderColor = el.color;
      slot.classList.add('filled');
    } else {
      slot.textContent = '';
      slot.style.background = 'rgba(255,255,255,0.05)';
      slot.style.borderColor = 'rgba(255,255,255,0.2)';
      slot.classList.remove('filled');
    }
  }
}

// ── Spell Casting ─────────────────────────────────────────────
function resolveSpell() {
  if (elementQueue.length === 0) return null;
  const elems = [...elementQueue];
  elementQueue = [];
  updateQueueUI();

  // Check for combos (2-element pairs take priority)
  let bestCombo = null;
  for (let i = 0; i < elems.length - 1; i++) {
    for (let j = i + 1; j < elems.length; j++) {
      const c = getCombo(elems[i], elems[j]);
      if (c && (!bestCombo || c.dmg > bestCombo.dmg)) {
        bestCombo = { ...c, usedI: i, usedJ: j };
      }
    }
  }

  if (bestCombo) {
    const baseDmg = bestCombo.dmg * 10 * (1 + (elems.length - 2) * 0.3);
    return { combo: true, ...bestCombo, damage: baseDmg, elements: elems, size: elems.length };
  }

  // Single-element spell
  const primary = elems[0];
  const el = ELEMENTS[primary];
  return {
    combo: false, name: primary, color: el.color, emoji: el.emoji,
    damage: 8 * elems.length, effect: primary, elements: elems, size: elems.length
  };
}

function castSpell(mode) {
  const spell = resolveSpell();
  if (!spell) return;
  if (player.mana < 10) return;
  player.mana = Math.max(0, player.mana - 8 - spell.size * 4);

  const angle = aimAngle;

  if (mode === 'self') {
    // Self-cast
    if (spell.effect === 'heal' || spell.elements.includes('life')) {
      player.hp = Math.min(player.maxHp, player.hp + 15 + spell.size * 5);
      spawnParticles(player.x, player.y, 20, '#68d391', 5);
      spellEffects.push({ type:'heal_ring', x:player.x, y:player.y, radius:0, maxRadius:60, color:'#68d391', life:30 });
    }
    if (spell.effect === 'barrier' || spell.elements.includes('shield')) {
      player.shieldActive = true;
      player.shieldTimer = 180 + spell.size * 60;
      player.barrierHp = 30 + spell.size * 10;
      spawnParticles(player.x, player.y, 15, '#a0aec0', 4);
    }
    if (spell.elements.includes('fire')) {
      // Fire nova around self
      spellEffects.push({ type:'nova', x:player.x, y:player.y, radius:0, maxRadius:100+spell.size*20, damage:spell.damage*0.7, color:spell.color, life:20 });
      spawnParticles(player.x, player.y, 25, spell.color, 6);
    }
    if (spell.elements.includes('cold')) {
      // Freeze nearby
      spellEffects.push({ type:'nova', x:player.x, y:player.y, radius:0, maxRadius:80+spell.size*15, damage:spell.damage*0.5, color:'#90cdf4', life:25, freeze:true });
      spawnParticles(player.x, player.y, 20, '#90cdf4', 5);
    }
    return;
  }

  if (mode === 'area') {
    // Area spell at mouse position
    const dist = Math.min(300, Math.hypot(mouseX - player.x, mouseY - player.y));
    const tx = player.x + Math.cos(angle) * dist;
    const ty = player.y + Math.sin(angle) * dist;
    const r = 50 + spell.size * 15;
    spellEffects.push({ type:'explosion', x:tx, y:ty, radius:0, maxRadius:r, damage:spell.damage*1.2, color:spell.color, life:25, freeze: spell.effect==='freeze'||spell.elements.includes('cold') });
    spawnParticles(tx, ty, 30, spell.color, 7);
    for (let i = 0; i < 8; i++) {
      const a = (Math.PI * 2 / 8) * i;
      particles.push({ x:tx, y:ty, vx:Math.cos(a)*4, vy:Math.sin(a)*4, life:20, color:spell.color, radius:3 });
    }
    return;
  }

  // Beam / projectile
  if (spell.effect === 'chain' || spell.elements.includes('lightning')) {
    // Lightning chain beam
    spellEffects.push({
      type:'beam', x:player.x, y:player.y, angle:angle,
      length:350+spell.size*30, width:4+spell.size*2, damage:spell.damage,
      color:spell.color, life:12, chain:true
    });
    spawnParticles(player.x + Math.cos(angle)*30, player.y + Math.sin(angle)*30, 10, spell.color, 4);
  } else {
    // Projectile
    const speed = 6 + spell.size * 0.5;
    projectiles.push({
      x: player.x + Math.cos(angle) * 25,
      y: player.y + Math.sin(angle) * 25,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      radius: 6 + spell.size * 2,
      damage: spell.damage,
      color: spell.color,
      life: 80,
      effect: spell.effect,
      pierce: spell.elements.includes('arcane') ? 2 : 0,
      trail: spell.color,
      elements: spell.elements,
      emoji: spell.emoji
    });
    spawnParticles(player.x + Math.cos(angle)*25, player.y + Math.sin(angle)*25, 8, spell.color, 3);
  }
}

// ── Enemies ───────────────────────────────────────────────────
const ENEMY_TYPES = {
  goblin:  { hp:30, speed:1.8, radius:14, color:'#48bb78', dmg:8,  score:10, emoji:'👹' },
  skeleton:{ hp:50, speed:1.3, radius:16, color:'#e2e8f0', dmg:12, score:20, emoji:'💀' },
  mage:    { hp:40, speed:1.0, radius:15, color:'#9f7aea', dmg:15, score:30, emoji:'🧙', shoots:true },
  demon:   { hp:120,speed:1.5, radius:22, color:'#e53e3e', dmg:20, score:50, emoji:'👿' },
  boss:    { hp:400,speed:0.8, radius:32, color:'#d69e2e', dmg:30, score:200,emoji:'🐉' },
};

function spawnEnemy() {
  const types = wave < 3 ? ['goblin','goblin','skeleton']
    : wave < 5 ? ['goblin','skeleton','skeleton','mage']
    : wave < 8 ? ['skeleton','mage','mage','demon']
    : ['mage','demon','demon','demon'];

  const typeName = types[Math.floor(Math.random() * types.length)];
  const type = ENEMY_TYPES[typeName];

  // Spawn at edge
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if (side === 0) { x = Math.random() * W; y = -30; }
  else if (side === 1) { x = W + 30; y = Math.random() * H; }
  else if (side === 2) { x = Math.random() * W; y = H + 30; }
  else { x = -30; y = Math.random() * H; }

  const hpMult = 1 + (wave - 1) * 0.15;
  enemies.push({
    x, y, ...type,
    hp: Math.floor(type.hp * hpMult),
    maxHp: Math.floor(type.hp * hpMult),
    typeName,
    frozen: 0,
    shootTimer: type.shoots ? 120 + Math.random() * 60 : 0,
    hitFlash: 0,
    knockX: 0, knockY: 0
  });
}

function spawnBoss() {
  const type = ENEMY_TYPES.boss;
  const hpMult = 1 + (wave - 1) * 0.2;
  enemies.push({
    x: W/2, y: -50, ...type,
    hp: Math.floor(type.hp * hpMult),
    maxHp: Math.floor(type.hp * hpMult),
    typeName: 'boss',
    frozen: 0, shootTimer: 80, hitFlash: 0,
    knockX: 0, knockY: 0, shoots: true
  });
}

// ── Particles ─────────────────────────────────────────────────
function spawnParticles(x, y, count, color, speed) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * speed;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: 15 + Math.random() * 20,
      color,
      radius: 1 + Math.random() * 3
    });
  }
}

// ── Update ────────────────────────────────────────────────────
let spawnTimer = 0;
let lastTime = 0;

function update(dt) {
  gameTime += dt;

  // ── Player movement
  let dx = 0, dy = 0;
  if (keys['w'] || keys['ц'] || keys['arrowup']) dy -= 1;
  if (keys['s'] || keys['ы'] || keys['arrowdown']) dy += 1;
  // Avoid conflict: 'a' is element key cold, so use arrow or й for left
  if (keys['arrowleft']) dx -= 1;
  if (keys['arrowright']) dx += 1;
  if (dx || dy) {
    const len = Math.hypot(dx, dy);
    player.x += (dx / len) * player.speed;
    player.y += (dy / len) * player.speed;
    player.angle = Math.atan2(dy, dx);
  }
  player.x = Math.max(player.radius, Math.min(W - player.radius, player.x));
  player.y = Math.max(player.radius, Math.min(H - player.radius, player.y));

  // Mana regen
  player.mana = Math.min(player.maxMana, player.mana + 0.15);
  if (player.invulnTimer > 0) player.invulnTimer--;
  if (player.shieldTimer > 0) { player.shieldTimer--; if (player.shieldTimer <= 0) player.shieldActive = false; }

  // Aim angle from mouse
  aimAngle = Math.atan2(mouseY - player.y, mouseX - player.x);

  // ── Wave system
  waveTimer += dt;
  if (waveTimer >= WAVE_DURATION) {
    wave++;
    waveTimer = 0;
    document.getElementById('wave-display').textContent = 'Волна ' + wave;
    if (wave % 3 === 0) spawnBoss();
    // Drop pickup
    pickups.push({ x: Math.random() * (W-100)+50, y: Math.random() * (H-100)+50, type: Math.random()>0.5?'hp':'mana', life:600 });
  }

  // ── Spawn enemies
  const spawnRate = Math.max(500, 2000 - wave * 150);
  spawnTimer += dt;
  if (spawnTimer >= spawnRate) {
    spawnTimer = 0;
    const count = 1 + Math.floor(wave / 3);
    for (let i = 0; i < count; i++) spawnEnemy();
  }

  // ── Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.frozen > 0) { e.frozen--; continue; }

    // Move toward player
    const ang = Math.atan2(player.y - e.y, player.x - e.x);
    const spd = e.speed * (e.typeName === 'boss' ? 1 : 1);
    e.x += Math.cos(ang) * spd + (e.knockX || 0);
    e.y += Math.sin(ang) * spd + (e.knockY || 0);
    e.knockX *= 0.85; e.knockY *= 0.85;
    if (e.hitFlash > 0) e.hitFlash--;

    // Shoot
    if (e.shoots) {
      e.shootTimer--;
      if (e.shootTimer <= 0) {
        e.shootTimer = e.typeName === 'boss' ? 50 : 100 + Math.random() * 50;
        const pAngle = Math.atan2(player.y - e.y, player.x - e.x);
        projectiles.push({
          x: e.x, y: e.y,
          vx: Math.cos(pAngle) * 4,
          vy: Math.sin(pAngle) * 4,
          radius: 5, damage: e.dmg * 0.6, color: '#ff6b6b',
          life: 80, enemy: true, trail: '#ff6b6b'
        });
      }
    }

    // Collide with player
    const dist = Math.hypot(e.x - player.x, e.y - player.y);
    if (dist < e.radius + player.radius) {
      if (player.invulnTimer <= 0) {
        let dmg = e.dmg;
        if (player.shieldActive) {
          player.barrierHp -= dmg;
          if (player.barrierHp <= 0) { player.shieldActive = false; player.shieldTimer = 0; }
          dmg = 0;
        }
        player.hp -= dmg;
        player.invulnTimer = 30;
        spawnParticles(player.x, player.y, 10, '#e53e3e', 4);
        // Knockback enemy
        e.knockX = -Math.cos(ang) * 8;
        e.knockY = -Math.sin(ang) * 8;
      }
    }

    // Remove dead
    if (e.hp <= 0) {
      score += e.score;
      document.getElementById('score-display').textContent = score;
      spawnParticles(e.x, e.y, 15, e.color, 5);
      enemies.splice(i, 1);
      // Chance to drop pickup
      if (Math.random() < 0.15) {
        pickups.push({ x:e.x, y:e.y, type:Math.random()>0.5?'hp':'mana', life:400 });
      }
    }
  }

  // ── Update projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx; p.y += p.vy;
    p.life--;

    // Trail
    if (p.trail && gameTime % 2 < 1) {
      particles.push({ x:p.x, y:p.y, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5, life:10, color:p.trail, radius:p.radius*0.5 });
    }

    if (p.x < -50 || p.x > W+50 || p.y < -50 || p.y > H+50 || p.life <= 0) {
      projectiles.splice(i, 1); continue;
    }

    if (p.enemy) {
      // Enemy projectile hits player
      const dist = Math.hypot(p.x - player.x, p.y - player.y);
      if (dist < p.radius + player.radius) {
        if (player.invulnTimer <= 0) {
          let dmg = p.damage;
          if (player.shieldActive) { player.barrierHp -= dmg; if (player.barrierHp<=0) { player.shieldActive=false; player.shieldTimer=0; } dmg=0; }
          player.hp -= dmg;
          player.invulnTimer = 20;
          spawnParticles(player.x, player.y, 8, '#e53e3e', 3);
        }
        projectiles.splice(i, 1); continue;
      }
    } else {
      // Player projectile hits enemies
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        const dist = Math.hypot(p.x - e.x, p.y - e.y);
        if (dist < p.radius + e.radius) {
          e.hp -= p.damage;
          e.hitFlash = 6;
          const ka = Math.atan2(e.y - player.y, e.x - player.x);
          e.knockX += Math.cos(ka) * 5;
          e.knockY += Math.sin(ka) * 5;
          spawnParticles(p.x, p.y, 8, p.color, 3);
          if (p.effect === 'freeze' || (p.elements && p.elements.includes('cold'))) e.frozen = 60;
          if (p.pierce > 0) { p.pierce--; p.damage *= 0.7; } else { projectiles.splice(i, 1); break; }
        }
      }
    }
  }

  // ── Update spell effects
  for (let i = spellEffects.length - 1; i >= 0; i--) {
    const s = spellEffects[i];
    s.life--;
    if (s.life <= 0) { spellEffects.splice(i, 1); continue; }

    if (s.type === 'explosion' || s.type === 'nova') {
      s.radius += (s.maxRadius - s.radius) * 0.15;
      // Damage enemies in radius
      for (const e of enemies) {
        const d = Math.hypot(e.x - s.x, e.y - s.y);
        if (d < s.radius && s.damage > 0) {
          e.hp -= s.damage * 0.08;
          e.hitFlash = 4;
          if (s.freeze) e.frozen = Math.max(e.frozen, 45);
        }
      }
    }
    if (s.type === 'heal_ring') {
      s.radius += (s.maxRadius - s.radius) * 0.2;
    }
    if (s.type === 'beam') {
      // Beam damage
      const cos = Math.cos(s.angle), sin = Math.sin(s.angle);
      for (const e of enemies) {
        // Point-to-line distance
        const dx = e.x - s.x, dy = e.y - s.y;
        const proj = dx * cos + dy * sin;
        if (proj < 0 || proj > s.length) continue;
        const perp = Math.abs(-dx * sin + dy * cos);
        if (perp < s.width + e.radius) {
          e.hp -= s.damage * 0.15;
          e.hitFlash = 4;
          if (s.chain) {
            // Chain to nearby enemies
            for (const e2 of enemies) {
              if (e2 === e) continue;
              if (Math.hypot(e2.x - e.x, e2.y - e.y) < 80) {
                e2.hp -= s.damage * 0.05;
                e2.hitFlash = 3;
              }
            }
          }
        }
      }
    }
  }

  // ── Pickups
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.life--;
    if (p.life <= 0) { pickups.splice(i, 1); continue; }
    const d = Math.hypot(p.x - player.x, p.y - player.y);
    if (d < 30) {
      if (p.type === 'hp') { player.hp = Math.min(player.maxHp, player.hp + 25); spawnParticles(p.x,p.y,10,'#68d391',3); }
      else { player.mana = Math.min(player.maxMana, player.mana + 30); spawnParticles(p.x,p.y,10,'#63b3ed',3); }
      pickups.splice(i, 1);
    }
  }

  // ── Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // ── HUD
  document.getElementById('hp-bar').style.width = Math.max(0, player.hp / player.maxHp * 100) + '%';
  document.getElementById('mana-bar').style.width = Math.max(0, player.mana / player.maxMana * 100) + '%';

  // ── Death
  if (player.hp <= 0) {
    gameRunning = false;
    document.getElementById('final-score').textContent = 'Очки: ' + score + ' | Волна: ' + wave;
    document.getElementById('death-screen').style.display = 'flex';
  }
}

// ── Render ─────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gridSize = 50;
  const offX = (-gameTime * 0.01) % gridSize;
  for (let x = offX; x < W; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = offX; y < H; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Pickups
  for (const p of pickups) {
    const alpha = p.life < 60 ? p.life / 60 : 1;
    ctx.globalAlpha = alpha;
    ctx.font = '20px serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.type === 'hp' ? '❤️' : '💎', p.x, p.y + 6);
    ctx.globalAlpha = 1;
  }

  // Spell effects
  for (const s of spellEffects) {
    const alpha = s.life / 30;
    if (s.type === 'explosion' || s.type === 'nova') {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
      ctx.fillStyle = s.color + Math.floor(alpha * 40).toString(16).padStart(2,'0');
      ctx.fill();
      ctx.strokeStyle = s.color + Math.floor(alpha * 180).toString(16).padStart(2,'0');
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    if (s.type === 'heal_ring') {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
      ctx.strokeStyle = s.color + Math.floor(alpha * 180).toString(16).padStart(2,'0');
      ctx.lineWidth = 3;
      ctx.stroke();
    }
    if (s.type === 'beam') {
      const cos = Math.cos(s.angle), sin = Math.sin(s.angle);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x + cos * s.length, s.y + sin * s.length);
      ctx.strokeStyle = s.color;
      ctx.lineWidth = s.width;
      ctx.shadowColor = s.color;
      ctx.shadowBlur = 15;
      ctx.globalAlpha = alpha;
      ctx.stroke();
      // Inner bright line
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = s.width * 0.4;
      ctx.stroke();
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }

  // Projectiles
  for (const p of projectiles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
    // Inner glow
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * 0.5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.6;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Enemies
  for (const e of enemies) {
    // Shadow
    ctx.beginPath();
    ctx.ellipse(e.x, e.y + e.radius, e.radius * 0.8, e.radius * 0.3, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fill();

    // Frozen tint
    if (e.frozen > 0) {
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius + 4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(144,205,244,0.3)';
      ctx.fill();
    }

    // Body
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
    ctx.fillStyle = e.hitFlash > 0 ? '#fff' : e.color;
    ctx.fill();

    // Emoji
    ctx.font = (e.radius * 1.2) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(e.emoji, e.x, e.y);

    // HP bar
    if (e.hp < e.maxHp) {
      const bw = e.radius * 2;
      const bh = 4;
      const bx = e.x - bw / 2;
      const by = e.y - e.radius - 10;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = '#e53e3e';
      ctx.fillRect(bx, by, bw * (e.hp / e.maxHp), bh);
    }
  }

  // Player
  ctx.save();
  // Shadow
  ctx.beginPath();
  ctx.ellipse(player.x, player.y + player.radius, player.radius * 0.9, player.radius * 0.3, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fill();

  // Shield
  if (player.shieldActive) {
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius + 10, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(160,174,192,0.6)';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.fillStyle = 'rgba(160,174,192,0.1)';
    ctx.fill();
  }

  // Body
  const flash = player.invulnTimer > 0 && player.invulnTimer % 4 < 2;
  if (!flash) {
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(player.x-4, player.y-4, 2, player.x, player.y, player.radius);
    grad.addColorStop(0, '#a78bfa');
    grad.addColorStop(1, '#6d28d9');
    ctx.fillStyle = grad;
    ctx.fill();

    // Wizard emoji
    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🧙', player.x, player.y);
  }

  // Aim indicator
  ctx.beginPath();
  ctx.arc(player.x + Math.cos(aimAngle) * 30, player.y + Math.sin(aimAngle) * 30, 4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  ctx.restore();

  // Particles
  for (const p of particles) {
    const alpha = p.life / 30;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.min(1, alpha);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Game Loop ─────────────────────────────────────────────────
function gameLoop(timestamp) {
  if (!gameRunning) return;
  const dt = lastTime ? timestamp - lastTime : 16;
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// ── Start / Restart ───────────────────────────────────────────
function startGame() {
  player.x = W / 2;
  player.y = H / 2;
  player.hp = player.maxHp;
  player.mana = player.maxMana;
  player.invulnTimer = 60;
  player.shieldActive = false;
  player.shieldTimer = 0;
  player.barrierHp = 0;
  score = 0; wave = 1; waveTimer = 0;
  gameTime = 0; spawnTimer = 0; lastTime = 0;
  enemies = []; projectiles = []; particles = [];
  spellEffects = []; pickups = [];
  elementQueue = [];
  updateQueueUI();
  document.getElementById('score-display').textContent = '0';
  document.getElementById('wave-display').textContent = 'Волна 1';
  document.getElementById('death-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'none';
  gameRunning = true;
  requestAnimationFrame(gameLoop);
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// Pre-select canvas for focus
canvas.tabIndex = 1;
canvas.addEventListener('click', () => canvas.focus());
</script>
